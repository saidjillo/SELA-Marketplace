<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;--bg2:#ffffff;--bg3:#f0ede8;
  --card:#ffffff;--border:#e8e4dd;--border2:#d4cfc8;
  --accent:#1a73e8;--accent2:#0d5bd1;--green:#15803d;--orange:#c2410c;--red:#dc2626;--gold:#d97706;--purple:#7c3aed;
  --text:#1c1917;--text2:#57534e;--text3:#a8a29e;
  --font-head:'Instrument Serif',Georgia,serif;
  --font-body:'Plus Jakarta Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.05);
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg3)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:var(--font-body)}
img{max-width:100%;border-radius:var(--radius-sm)}

/* ── Breadcrumb ── */
.breadcrumb{background:var(--bg2);border-bottom:1px solid var(--border);padding:.6rem 2rem;font-size:.73rem;color:var(--text3);display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
.breadcrumb a{color:var(--text2);transition:color .15s}.breadcrumb a:hover{color:var(--accent)}
.breadcrumb-sep{color:var(--border2)}

/* ── Page layout ── */
.page-wrap{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 5rem}
.post-layout{display:grid;grid-template-columns:1fr 300px;gap:2rem;align-items:start}
@media(max-width:900px){.post-layout{grid-template-columns:1fr}}

/* ── Status bar ── */
.status-bar{display:flex;align-items:center;gap:.65rem;margin-bottom:1.5rem;flex-wrap:wrap}
.type-badge{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .85rem;border-radius:20px;font-size:.75rem;font-weight:700}
.type-badge.question{background:#eff6ff;color:var(--accent);border:1px solid #bfdbfe}
.type-badge.idea{background:#fdf4ff;color:var(--purple);border:1px solid #e9d5ff}
.type-badge.post{background:#f0fdf4;color:var(--green);border:1px solid #bbf7d0}
.status-badge{display:inline-flex;align-items:center;gap:.3rem;padding:.28rem .75rem;border-radius:20px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.status-badge.resolved{background:#dcfce7;color:#166534;border:1px solid #86efac}
.status-badge.open{background:#f0f9ff;color:#0369a1;border:1px solid #bae6fd}
.status-badge.pinned{background:#fef9c3;color:#854d0e;border:1px solid #fde68a}

/* ── Post title ── */
.post-title{font-family:var(--font-head);font-size:2rem;font-weight:400;line-height:1.3;margin-bottom:1.25rem;color:var(--text)}
@media(max-width:600px){.post-title{font-size:1.5rem}}

/* ── Author bar ── */
.author-bar{display:flex;align-items:center;gap:.85rem;padding:1rem 1.25rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1.5rem;box-shadow:var(--shadow)}
.author-avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;font-family:var(--font-mono);color:#fff;flex-shrink:0}
.author-name{font-weight:700;font-size:.92rem;margin-bottom:.1rem}
.author-username{font-size:.73rem;color:var(--text3);font-family:var(--font-mono)}
.author-meta{margin-left:auto;text-align:right;font-size:.72rem;color:var(--text3);line-height:1.6}
.admin-chip{display:inline-flex;align-items:center;gap:.25rem;font-size:.62rem;font-weight:800;text-transform:uppercase;background:#fef3c7;color:#92400e;padding:.15rem .5rem;border-radius:4px;letter-spacing:.06em;margin-left:.4rem}

/* ── Post body ── */
.post-body-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem;box-shadow:var(--shadow)}
.post-body{font-size:.95rem;line-height:1.8;color:var(--text2);white-space:pre-wrap;word-break:break-word}
.post-body-img{width:100%;max-height:480px;object-fit:cover;border-radius:var(--radius);margin-top:1.25rem;border:1px solid var(--border)}
.post-link-preview{display:flex;align-items:center;gap:.75rem;padding:.85rem 1rem;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);margin-top:1.25rem;transition:background .15s;color:var(--accent)}
.post-link-preview:hover{background:#eff6ff}
.plp-icon{font-size:1.1rem;flex-shrink:0}
.plp-title{font-weight:600;font-size:.85rem}
.plp-url{font-size:.7rem;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Tags */
.post-tags{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:1rem;padding-top:.85rem;border-top:1px solid var(--border)}
.post-tag{font-size:.7rem;font-weight:600;padding:.22rem .65rem;border-radius:20px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.post-tag:hover{background:#eff6ff;color:var(--accent);border-color:#bfdbfe}

/* ── Action bar ── */
.action-bar{display:flex;align-items:center;gap:.65rem;margin-bottom:2rem;flex-wrap:wrap}
.act-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1.1rem;border:1.5px solid var(--border);border-radius:20px;font-size:.8rem;font-weight:600;background:var(--card);color:var(--text2);cursor:pointer;transition:all .18s}
.act-btn:hover{border-color:var(--accent);color:var(--accent);background:#eff6ff}
.act-btn.liked{border-color:var(--red);color:var(--red);background:#fef2f2}
.act-btn.resolved-active{border-color:var(--green);color:var(--green);background:#f0fdf4}
.act-btn.pin-active{border-color:var(--gold);color:var(--gold);background:#fef9c3}
.act-btn.danger{border-color:var(--red);color:var(--red)}
.act-btn.danger:hover{background:#fef2f2}
.views-info{margin-left:auto;font-size:.73rem;color:var(--text3);display:flex;align-items:center;gap:.35rem}

/* ── Divider ── */
.section-divider{display:flex;align-items:center;gap:.75rem;margin:2rem 0 1.5rem;font-family:var(--font-head);font-size:1.2rem;color:var(--text2)}
.section-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Reply cards ── */
.reply-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:.85rem;box-shadow:var(--shadow);transition:border-color .2s}
.reply-card:hover{border-color:var(--border2)}
.reply-card.accepted{border-left:4px solid var(--green);background:#fafffe}
.reply-head{display:flex;align-items:center;gap:.65rem;margin-bottom:.85rem;flex-wrap:wrap}
.reply-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;font-family:var(--font-mono);color:#fff;flex-shrink:0}
.reply-name{font-weight:700;font-size:.86rem}
.reply-username{font-size:.7rem;color:var(--text3);font-family:var(--font-mono)}
.reply-time{font-size:.7rem;color:var(--text3);margin-left:auto}
.accepted-badge{display:inline-flex;align-items:center;gap:.3rem;font-size:.65rem;font-weight:800;text-transform:uppercase;background:#dcfce7;color:#166534;padding:.15rem .55rem;border-radius:4px;letter-spacing:.06em}
.reply-body{font-size:.9rem;color:var(--text2);line-height:1.75;white-space:pre-wrap;margin-bottom:.85rem;word-break:break-word}
.reply-actions{display:flex;align-items:center;gap:.75rem}
.reply-act{display:flex;align-items:center;gap:.3rem;font-size:.75rem;font-weight:600;color:var(--text3);background:none;border:none;cursor:pointer;padding:.25rem .5rem;border-radius:6px;transition:all .15s}
.reply-act:hover{background:var(--bg3);color:var(--text2)}
.reply-act.liked{color:var(--red)}
.reply-act.accept-btn{color:var(--green)}
.reply-act.accept-btn:hover{background:#f0fdf4}

/* ── Reply form ── */
.reply-form-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-top:1.5rem;box-shadow:var(--shadow)}
.rf-head{padding:.85rem 1.25rem;background:var(--bg3);border-bottom:1px solid var(--border);font-size:.82rem;font-weight:700;color:var(--text2);display:flex;align-items:center;gap:.4rem}
.rf-body{padding:0 1.25rem 1.25rem}
/* Emoji toolbar */
.emoji-toolbar{display:flex;align-items:center;gap:.3rem;padding:.5rem .65rem;background:var(--bg3);border-bottom:1px solid var(--border);flex-wrap:wrap}
.emoji-btn{background:none;border:none;font-size:1.05rem;cursor:pointer;padding:.18rem .28rem;border-radius:5px;transition:background .13s;line-height:1;opacity:.72}
.emoji-btn:hover{background:var(--border2);opacity:1}
.emoji-sep{width:1px;height:18px;background:var(--border2);margin:0 .15rem;flex-shrink:0}
.emoji-search-wrap{position:relative;margin-left:auto}
.emoji-more-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.22rem .65rem;background:var(--bg2);border:1px solid var(--border);border-radius:6px;font-size:.72rem;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s}
.emoji-more-btn:hover{border-color:var(--accent);color:var(--accent)}
.emoji-picker-popup{position:absolute;right:0;top:calc(100% + 6px);background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);width:300px;box-shadow:var(--shadow-md);z-index:500}
.emoji-picker-popup.hidden{display:none}
.epp-search{padding:.5rem .75rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem}
.epp-search input{flex:1;border:none;outline:none;font-size:.82rem;background:none;font-family:var(--font-body);color:var(--text)}
.epp-cats{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.epp-cats::-webkit-scrollbar{display:none}
.epp-cat-btn{padding:.35rem .6rem;font-size:.9rem;background:none;border:none;cursor:pointer;border-bottom:2.5px solid transparent;transition:all .15s;flex-shrink:0}
.epp-cat-btn.active{border-bottom-color:var(--accent)}
.epp-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;padding:.5rem;max-height:180px;overflow-y:auto}
.epp-emoji{font-size:1.2rem;padding:.3rem;border-radius:6px;cursor:pointer;text-align:center;background:none;border:none;transition:background .12s}
.epp-emoji:hover{background:var(--bg3)}
.rf-textarea{width:100%;padding:.85rem 1rem;background:var(--bg);border:none;border-top:1px solid var(--border);font-family:var(--font-body);font-size:.88rem;color:var(--text);resize:vertical;min-height:110px;outline:none;line-height:1.7}
.rf-footer{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem;border-top:1px solid var(--border);background:var(--bg3);flex-wrap:wrap;gap:.5rem}
.rf-char{font-size:.68rem;color:var(--text3);font-family:var(--font-mono)}
.rf-submit{padding:.6rem 1.5rem;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s}
.rf-submit:hover{background:var(--accent2)}
.rf-submit:disabled{background:var(--border2);color:var(--text3);cursor:not-allowed}
.login-prompt-box{padding:1.5rem;text-align:center;font-size:.88rem;color:var(--text2)}
.login-prompt-box a{color:var(--accent);font-weight:700;cursor:pointer}
.login-prompt-box a:hover{text-decoration:underline}

/* ── Sidebar ── */
.sidebar-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1rem;box-shadow:var(--shadow)}
.sc-head{padding:.85rem 1rem;background:var(--bg3);border-bottom:1px solid var(--border);font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--text3)}
.sc-body{padding:.5rem}
.sc-stat{display:flex;align-items:center;justify-content:space-between;padding:.5rem .5rem;font-size:.82rem;color:var(--text2)}
.sc-stat strong{font-family:var(--font-mono);font-size:.9rem;color:var(--text)}
.sc-related-item{display:flex;gap:.65rem;padding:.65rem .5rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;border-radius:var(--radius-sm)}
.sc-related-item:last-child{border-bottom:none}
.sc-related-item:hover{background:var(--bg3)}
.sc-ri-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.sc-ri-dot.question{background:var(--accent)}
.sc-ri-dot.idea{background:var(--purple)}
.sc-ri-dot.post{background:var(--green)}
.sc-ri-title{font-size:.78rem;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:.2rem}
.sc-ri-meta{font-size:.67rem;color:var(--text3)}
.back-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.1rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.8rem;font-weight:600;color:var(--text2);cursor:pointer;transition:all .18s;box-shadow:var(--shadow)}
.back-btn:hover{border-color:var(--accent);color:var(--accent);background:#eff6ff}

/* ── Loading/Error states ── */
.page-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:1rem;color:var(--text3)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.page-error{text-align:center;padding:4rem 2rem}
.page-error-icon{font-size:3rem;margin-bottom:1rem}

/* ── Toast ── */
.hc-toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);padding:.55rem 1.35rem;border-radius:20px;font-size:.82rem;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;white-space:nowrap;color:#fff;box-shadow:var(--shadow-md)}
.hc-toast.show{opacity:1}

/* ── Footer ── */
.ac-footer{background:var(--bg2);border-top:1px solid var(--border);padding:1.5rem 2rem;text-align:center;font-size:.75rem;color:var(--text3);margin-top:4rem}
.ac-footer a{color:var(--text2)}.ac-footer a:hover{color:var(--accent)}

<script>
const API = window.SELA_API || 'http://localhost:5000/api';
let POST = null;
let REPLIES = [];

// ── Auth ──────────────────────────────────────────────────────────────────────
function getToken()  { return localStorage.getItem('td_token') || window._acUser?.getToken() || null; }
function getUser()   { return window._acUser?.getUser() || null; }
function isAdmin()   { return !!localStorage.getItem('td_token'); }
function isLoggedIn(){ return isAdmin() || window._acUser?.isLoggedIn(); }

// ── Toast ─────────────────────────────────────────────────────────────────────
let _tt;
function toast(msg, type='success') {
  const el = document.getElementById('hcToast');
  el.textContent = msg;
  el.style.background = type==='error'?'#dc2626':type==='warn'?'#d97706':'#15803d';
  el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(()=>el.classList.remove('show'), 3000);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const COLORS = ['#1a73e8','#7c3aed','#c2410c','#0369a1','#15803d','#be185d','#b45309','#0891b2'];
function avatarColor(name) {
  let h=0; for(let i=0;i<(name||'').length;i++) h=name.charCodeAt(i)+((h<<5)-h);
  return COLORS[Math.abs(h)%COLORS.length];
}
function avatarLetter(name) { return ((name||'?')[0]).toUpperCase(); }
function timeAgo(dt) {
  const s = Math.floor((Date.now()-new Date(dt))/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  if(s<604800) return Math.floor(s/86400)+'d ago';
  return new Date(dt).toLocaleDateString('en-KE',{day:'numeric',month:'short',year:'numeric'});
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Emoji system ──────────────────────────────────────────────────────────────
const EMOJI_CATS = {
  '😀':['😀','😂','🤣','😊','😍','🥰','😎','🤩','😅','😭','😤','🥺','😢','😡','🤔','🤗','😴','🤯','🥳','😇','🫡','🙃','🫠','😏','🤫','🤭'],
  '👍':['👍','👎','👏','🙌','🤝','✌️','🤞','👋','🫶','❤️','🧡','💛','💚','💙','💜','🖤','🤍','💔','❤️‍🔥','💯','✅','❌','⚠️','🔥','⭐','🎉'],
  '🛍️':['🛍️','📱','💻','🖥️','🖨️','📡','🔌','💾','🔋','⚡','🛒','📦','🚚','🏪','💳','💰','🤑','📊','🔧','🛠️','💡','🔑','🏷️','📋','📌','🗂️'],
  '✍️':['✍️','📝','✏️','🖊️','📖','📚','💬','🗨️','🗯️','💭','📣','📢','🔔','ℹ️','❓','❗','➡️','⬅️','⬆️','⬇️','🔗','🌐','📧','📞','📲','🔍'],
  '🎯':['🎯','🏆','🥇','🎖️','🌟','💫','✨','🎊','🎁','🎈','🎀','🏅','🥈','🥉','🎗️','🏵️','🎓','📜','🔖','📍','🗺️','🌍','🌏','🌎','🗓️','⏰'],
};
let _emojiActiveCat = '😀';

function buildEmojiToolbar(textareaId, pickerId) {
  const quick = ['😊','😂','❤️','👍','🔥','✅','💡','❓','🎉','😎','🙌','💯'];
  const qBtns = quick.map(e=>`<button class="emoji-btn" onclick="insertEmoji('${e}','${textareaId}')" title="${e}">${e}</button>`).join('');
  return `<div class="emoji-toolbar">
    ${qBtns}
    <div class="emoji-sep"></div>
    <div class="emoji-search-wrap">
      <button class="emoji-more-btn" onclick="toggleEmojiPicker('${pickerId}')">😊 More</button>
      <div class="emoji-picker-popup hidden" id="${pickerId}">
        <div class="epp-search"><span>🔍</span><input type="text" placeholder="Search emoji…" oninput="filterEmoji(this.value,'${textareaId}','${pickerId}')"/></div>
        <div class="epp-cats" id="${pickerId}_cats">
          ${Object.keys(EMOJI_CATS).map((cat,i)=>`<button class="epp-cat-btn ${i===0?'active':''}" onclick="switchEmojiCat('${cat}','${textareaId}','${pickerId}')">${cat}</button>`).join('')}
        </div>
        <div class="epp-grid" id="${pickerId}_grid">
          ${EMOJI_CATS['😀'].map(e=>`<button class="epp-emoji" onclick="insertEmoji('${e}','${textareaId}')" title="${e}">${e}</button>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

function toggleEmojiPicker(pickerId) {
  const popup = document.getElementById(pickerId);
  if (!popup) return;
  const hidden = popup.classList.contains('hidden');
  document.querySelectorAll('.emoji-picker-popup').forEach(p=>p.classList.add('hidden'));
  if (hidden) popup.classList.remove('hidden');
}

function switchEmojiCat(cat, textareaId, pickerId) {
  _emojiActiveCat = cat;
  document.querySelectorAll(`#${pickerId}_cats .epp-cat-btn`).forEach(b=>b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  const grid = document.getElementById(pickerId+'_grid');
  if (grid) grid.innerHTML = EMOJI_CATS[cat].map(e=>`<button class="epp-emoji" onclick="insertEmoji('${e}','${textareaId}')">${e}</button>`).join('');
}

function filterEmoji(q, textareaId, pickerId) {
  const grid = document.getElementById(pickerId+'_grid');
  if (!grid) return;
  const all = Object.values(EMOJI_CATS).flat();
  const filtered = q ? all : EMOJI_CATS[_emojiActiveCat];
  grid.innerHTML = filtered.map(e=>`<button class="epp-emoji" onclick="insertEmoji('${e}','${textareaId}')">${e}</button>`).join('');
}

function insertEmoji(emoji, textareaId) {
  const ta = document.getElementById(textareaId);
  if (!ta) return;
  const s=ta.selectionStart, e=ta.selectionEnd;
  ta.value = ta.value.slice(0,s)+emoji+ta.value.slice(e);
  ta.selectionStart = ta.selectionEnd = s+emoji.length;
  ta.focus();
  ta.dispatchEvent(new Event('input'));
}

document.addEventListener('click', e => {
  if (!e.target.closest('.emoji-search-wrap')) document.querySelectorAll('.emoji-picker-popup').forEach(p=>p.classList.add('hidden'));
});

// ── Load post ─────────────────────────────────────────────────────────────────
async function loadPost() {
  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) { showError('No post specified.'); return; }
  try {
    const r = await fetch(`${API}/help/${id}`, { signal: AbortSignal.timeout(8000) });
    const j = await r.json();
    if (!j.success) throw new Error(j.message);
    POST    = j.data;
    REPLIES = j.replies || [];
    renderPage();
  } catch(err) {
    showError('Could not load post. ' + (err.message.includes('fetch')?'Is the backend running?':''));
  }
}

function showError(msg) {
  document.getElementById('pageContent').innerHTML = `
    <div class="page-error">
      <div class="page-error-icon">😔</div>
      <p style="font-size:.95rem;color:var(--text2);margin-bottom:1.5rem">${escHtml(msg)}</p>
      <a href="help.html" class="back-btn">← Back to Help Center</a>
    </div>
    <div id="dwAhpost"></div>`;
}

  document.getElementById('pageContent').innerHTML = `
    <div class="post-layout">

            <div class="author-name">${escHtml(p.author?.name||'Anonymous')}${p.author?.isAdmin?'<span class="admin-chip">Team</span>':''}</div>

        <div class="dw-amt-label">Support<br/>brighter futures</div>
        <div class="dw-amt-check">✓</div>
      </div>
        <div class="dw-amt-kes">1,000</div>
        <div class="dw-amt-label">Empower<br/>lasting change</div>
        <div class="dw-amt-check">✓</div>
      </div>
    </div>

        oninput="dwTyped('helppost')"/>

        oninput="this.value=this.value.replace(/[^0-9]/g,'')"/>
    </div>

    </button>

function replyHTML(rep, post, canManage) {
  const canAccept = canManage && post.type === 'question';
  return `<div class="reply-card ${rep.accepted?'accepted':''}" id="rep_${rep.id}">
    <div class="reply-head">
      <div class="reply-avatar" style="background:${avatarColor(rep.author?.name||'?')}">${avatarLetter(rep.author?.name||'?')}</div>
      <div>
        <div class="reply-name">${escHtml(rep.author?.name||'?')}${rep.author?.isAdmin?'<span class="admin-chip">Team</span>':''}</div>
        ${rep.author?.username?`<div class="reply-username">@${escHtml(rep.author.username)}</div>`:''}
      </div>
      ${rep.accepted?'<span class="accepted-badge">✓ Best Answer</span>':''}
      <span class="reply-time">${timeAgo(rep.createdAt)}</span>
    </div>
    <div class="reply-body">${escHtml(rep.body)}</div>
    <div class="reply-actions">
      <button class="reply-act" onclick="likeReply('${rep.id}',this)">
        ♥ <span id="repLike_${rep.id}">${rep.likes||0}</span>
      </button>
      ${canAccept?`<button class="reply-act accept-btn" onclick="acceptReply('${rep.id}')" style="${rep.accepted?'color:var(--green);font-weight:700;background:#f0fdf4':''}">${rep.accepted?'✓ Accepted':'✓ Accept Answer'}</button>`:''}
    </div>
  </div>`;
}

// ── Load related ──────────────────────────────────────────────────────────────
async function loadRelated(p) {
  try {
    const r = await fetch(`${API}/help?limit=5&type=${p.type}`);
    const j = await r.json();
    const el = document.getElementById('relatedPosts');
    if (!el) return;
    const related = (j.data||[]).filter(x => x.id !== p.id).slice(0,4);
    if (!related.length) { el.innerHTML='<div style="padding:.75rem 1rem;font-size:.78rem;color:var(--text3)">No related posts yet.</div>'; return; }
    el.innerHTML = related.map(rp=>`
      <div class="sc-related-item" onclick="window.location.href='help-post.html?id=${rp.id}'">
        <div class="sc-ri-dot ${rp.type}"></div>
        <div>
          <div class="sc-ri-title">${escHtml(rp.title.slice(0,60))}${rp.title.length>60?'…':''}</div>
          <div class="sc-ri-meta">${rp.answers||0} replies · ${timeAgo(rp.createdAt)}</div>
        </div>
      </div>`).join('');
  } catch {}
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function likePost() {
  const tok = getToken();
  const headers = tok ? { 'Authorization':'Bearer '+tok } : {};
  try {
    const r = await fetch(`${API}/help/${POST.id}/like`, { method:'POST', headers });
    const j = await r.json();
    if (j.success) {
      POST.likes = j.likes;
      const btn = document.getElementById('likeBtn');
      const sbLikes = document.getElementById('sbLikes');
      if (btn) { btn.innerHTML = `♥ ${j.likes} Like${j.likes!==1?'s':''}`;  btn.classList.toggle('liked', j.liked); }
      if (sbLikes) sbLikes.textContent = j.likes;
    }
  } catch { toast('Could not like — check connection','error'); }
}

async function likeReply(id, btn) {
  const tok = getToken();
  const headers = tok ? { 'Authorization':'Bearer '+tok } : {};
  try {
    const r = await fetch(`${API}/help/replies/${id}/like`, { method:'POST', headers });
    const j = await r.json();
    if (j.success) {
      const el = document.getElementById('repLike_'+id);
      if (el) el.textContent = j.likes;
      if (btn) btn.classList.toggle('liked', j.liked);
    }
  } catch {}
}

async function acceptReply(replyId) {
  const tok = getToken();
  if (!tok) { toast('Login required','warn'); return; }
  try {
    const r = await fetch(`${API}/help/replies/${replyId}/accept`, { method:'PATCH', headers:{'Authorization':'Bearer '+tok} });
    const j = await r.json();
    if (j.success) {
      toast(j.accepted ? '✅ Marked as best answer' : 'Unmarked');
      await reloadPost();
    } else toast(j.message,'error');
  } catch { toast('Error','error'); }
}

async function resolvePost() {
  const tok = getToken();
  if (!tok) { toast('Login required','warn'); return; }
  try {
    const r = await fetch(`${API}/help/${POST.id}/resolve`, { method:'PATCH', headers:{'Authorization':'Bearer '+tok} });
    const j = await r.json();
    if (j.success) { toast(`Marked as ${j.status}`); await reloadPost(); }
    else toast(j.message,'error');
  } catch { toast('Error','error'); }
}

async function pinPost() {
  const tok = getToken();
  if (!tok) { toast('Login required','warn'); return; }
  try {
    const r = await fetch(`${API}/help/${POST.id}/pin`, { method:'PATCH', headers:{'Authorization':'Bearer '+tok} });
    const j = await r.json();
    if (j.success) { toast(j.pinned?'📌 Pinned':'Unpinned'); await reloadPost(); }
    else toast(j.message,'error');
  } catch { toast('Error','error'); }
}

async function deletePost() {
  if (!confirm('Delete this post? This cannot be undone.')) return;
  const tok = getToken();
  try {
    const r = await fetch(`${API}/help/${POST.id}`, { method:'DELETE', headers:{'Authorization':'Bearer '+tok} });
    const j = await r.json();
    if (j.success) { toast('Post deleted'); setTimeout(()=>window.location.href='help.html',800); }
    else toast(j.message,'error');
  } catch { toast('Error','error'); }
}

function sharePost() {
  const url = window.location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(()=>toast('🔗 Link copied to clipboard!'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = url; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('🔗 Link copied!');
  }
}

async function submitReply() {
  const body = document.getElementById('replyBody')?.value.trim();
  const btn  = document.getElementById('rfSubmit');
  if (!body) { toast('Write a reply first','warn'); return; }
  if (btn) { btn.disabled=true; btn.textContent='Posting…'; }
  try {
    const tok = getToken();
    const userTok = window._acUser?.getToken();
    const headers = { 'Content-Type':'application/json' };
    if (tok) headers['Authorization'] = 'Bearer '+tok;
    else if (userTok) headers['Authorization'] = 'Bearer '+userTok;
    const r = await fetch(`${API}/help/${POST.id}/replies`, {
      method:'POST', headers, body: JSON.stringify({ body })
    });
    const j = await r.json();
    if (j.success) {
      toast('Reply posted! ✓');
      document.getElementById('replyBody').value = '';
      document.getElementById('rfChar').textContent = '0 / 3000';
      await reloadPost();
    } else if (j.needsLogin) {
      window.location.href = 'auth.html?redirect='+encodeURIComponent(window.location.href);
    } else {
      toast(j.message||'Failed to post reply','error');
    }
  } catch { toast('Cannot connect','error'); }
  finally { if(btn){ btn.disabled=false; btn.textContent='Post Reply'; } }
}

async function reloadPost() {
  const id = new URLSearchParams(window.location.search).get('id');
  try {
    const r = await fetch(`${API}/help/${id}`);
    const j = await r.json();
    if (j.success) { POST=j.data; REPLIES=j.replies||[]; renderPage(); }
  } catch {}
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadPost();
